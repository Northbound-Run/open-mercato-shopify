# Publish this package to npm via OIDC "trusted publishing" — no long-lived NPM_TOKEN.
#
# ONE-TIME npm-side setup
#   npmjs.com > @northbound-run/sync-shopify > Settings > Trusted Publisher > GitHub Actions:
#     Organization or user : Northbound-Run
#     Repository           : open-mercato-shopify
#     Workflow filename    : publish.yml        (filename only, NOT a path)
#     Environment name     : (leave blank)
#     Allowed actions      : npm publish
#   (First publish of a brand-new package: npm lets you pre-configure the trusted
#    publisher before the first publish. If it insists the package must exist, do ONE
#    manual `npm publish` while logged in, then this workflow handles every release after.)
#
# TO RELEASE: bump the version, then push a matching tag:
#     npm version patch        # edits package.json + creates the vX.Y.Z tag + commit
#     git push --follow-tags
#   The tag push triggers this workflow, which publishes package.json's version.
name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  id-token: write   # REQUIRED — mints the OIDC token npm verifies for trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest   # trusted publishing requires a GitHub-hosted runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'                        # >= 22.14 required for OIDC publishing
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify the tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # `npm publish` runs the package's own build (prepublishOnly / prepack) and
      # authenticates via OIDC. No NODE_AUTH_TOKEN on purpose — setting it would force
      # the legacy token path. No --provenance: this repo is private, where provenance
      # is unavailable (trusted publishing still works).
      - name: Publish to npm
        run: npm publish --access public
